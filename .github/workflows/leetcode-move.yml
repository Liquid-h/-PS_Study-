name: Move LeetCode Folders

on:
  push:
    branches:
      - main
permissions: 
  contents: write

jobs:
  move-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Move LeetCode Folders
        run: |
          mkdir -p LeetCode
          shopt -s nullglob
          for d in 0* 1*; do
            [ -d "$d" ] && mv "$d" LeetCode/
          done

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add LeetCode
          git add -u
          git commit -m "자동 정리: LeetCode 문제 폴더 이동" || echo "No changes to commit"
          git push
