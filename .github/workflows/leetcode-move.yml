permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  move-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove existing folders with same name (pre-cleanup)
        run: |
          shopt -s nullglob
          for d in 0* 1*; do
            [ -d "LeetCode/$d" ] && rm -rf "LeetCode/$d" || true
          done

      - name: Move LeetCode Folders
        run: |
          mkdir -p LeetCode
          shopt -s nullglob
          for d in 0* 1*; do
            [ -d "$d" ] && mv "$d" LeetCode/
          done

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add LeetCode
          git add -u
          git commit -m "자동 정리: LeetCode 문제 폴더 이동" || echo "No changes to commit"

      - name: Pull latest remote
        run: git pull --rebase

      - name: Push
        run: git push
