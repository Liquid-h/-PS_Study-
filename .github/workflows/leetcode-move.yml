permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  move-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

  
      - name: Pull latest remote
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase

      - name: Remove existing folders with same name (pre-cleanup)
        run: |
          shopt -s nullglob
          for d in 0* 1*; do
            [ -d "LeetCode/$d" ] && rm -rf "LeetCode/$d" || true
          done


      - name: Move LeetCode Folders
        run: |
          mkdir -p LeetCode
          shopt -s nullglob
          for d in 0* 1*; do
            [ -d "$d" ] && mv "$d" LeetCode/
          done

      - name: Commit and Push changes
        run: |
          git add LeetCode
          git add -u
          
       
          if ! git diff --staged --quiet; then
            git commit -m "자동 정리: LeetCode 문제 폴더 이동"
            
          
            git pull origin main --rebase
            git push
          else
            echo "No changes to commit, skipping push."
          fi
